<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#eef4f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="落石記帳">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>落石記帳</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-label="落石記帳アプリ">
      <header class="topbar">
        <div>
          <p class="eyebrow">現場入力</p>
          <h1>落石記帳</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="site-button" type="button">現場</button>
          <button class="ghost-button" id="map-button" type="button">図面</button>
          <button class="ghost-button" id="photo-button" type="button">写真</button>
          <button class="ghost-button" id="new-record" type="button">新規</button>
        </div>
      </header>

      <section class="site-panel">
        <div>
          <p class="summary-title">現場</p>
          <p class="site-name" id="site-name">未設定</p>
        </div>
        <div class="site-actions">
          <button class="small-button neutral-button" id="backup-site" type="button">バックアップ</button>
          <button class="small-button neutral-button" id="restore-site" type="button">復元</button>
          <button class="small-button neutral-button" id="export-photos" type="button">写真ZIP</button>
        </div>
      </section>

      <section class="record-strip" aria-label="記録一覧">
        <button class="record-pill active" type="button" data-record-index="0">No.1</button>
      </section>

      <section class="active-record" id="active-record-label" aria-live="polite">
        現在入力中: No.1
      </section>

      <section class="photo-panel" id="photo-panel">
        <div class="photo-head">
          <div>
            <p class="summary-title">写真</p>
            <p class="photo-meta" id="photo-meta">Noごとに全景・形状・奥行きを撮影</p>
          </div>
          <div class="photo-actions">
            <button class="small-button neutral-button" id="toggle-rock-list" type="button">落石一覧</button>
            <button class="small-button neutral-button" id="toggle-situation-list" type="button">状況一覧</button>
          </div>
        </div>
        <div class="photo-menu" id="photo-menu" hidden>
          <div class="photo-menu-head">
            <p>撮影する写真を選択</p>
          </div>
          <div class="photo-capture-grid">
            <button type="button" data-photo-kind="full">落石: 全景</button>
            <button type="button" data-photo-kind="shape">落石: 縦横</button>
            <button type="button" data-photo-kind="depth">落石: 奥行</button>
            <button type="button" id="situation-photo">状況写真</button>
          </div>
        </div>
        <div class="photo-list" id="photo-list"></div>
      </section>

      <section class="focus-panel" aria-live="polite">
        <div class="focus-head">
          <div>
            <p class="step-count" id="step-count">1 / 14</p>
            <h2 id="field-label">高さ</h2>
          </div>
          <button class="small-button" id="clear-field" type="button">削除</button>
        </div>

        <button class="value-display" id="value-display" type="button" aria-label="現在の入力値">
          <span id="value-text">未入力</span>
          <span id="value-unit">m</span>
        </button>

        <div class="quick-row" id="quick-row"></div>
      </section>

      <section class="field-list" id="field-list" aria-label="入力項目"></section>

      <section class="summary-panel">
        <div>
          <p class="summary-title">入力済み</p>
          <p class="summary-count" id="summary-count">0 / 14</p>
        </div>
        <button class="primary-button" id="export-csv" type="button">入力CSV</button>
      </section>
    </main>

    <input id="camera-input" type="file" accept="image/*" capture="environment" hidden>
    <input id="map-input" type="file" accept="image/*,application/pdf,.pdf" hidden>
    <input id="restore-input" type="file" accept="application/json,.json" hidden>

    <div class="map-modal" id="map-modal" hidden>
      <section class="map-card" role="dialog" aria-modal="true" aria-labelledby="map-title">
        <div class="map-toolbar">
          <div>
            <p class="eyebrow">位置図</p>
            <h2 id="map-title">等高線図</h2>
          </div>
          <div class="map-toolbar-actions">
            <button class="map-close" id="map-controls-toggle" type="button">操作</button>
            <button class="map-close" id="close-map" type="button">閉じる</button>
          </div>
        </div>

        <div class="map-portrait-guide">
          <strong>横向きにしてください</strong>
          <span>図面は横向きの画面で広く操作できます。</span>
        </div>

        <div class="map-workspace">
          <div class="map-stage-wrap">
            <canvas id="map-canvas"></canvas>
            <div class="map-crosshair" id="map-crosshair" aria-hidden="true" hidden>
              <span class="map-crosshair-v"></span>
              <span class="map-crosshair-h"></span>
              <span class="map-crosshair-dot"></span>
            </div>
            <div class="map-zoom-bar">
              <button type="button" id="map-zoom-out">－</button>
              <button type="button" id="map-zoom-fit">全体</button>
              <button type="button" id="map-zoom-in">＋</button>
            </div>
          </div>
          <div class="map-panel collapsed" id="map-panel">
            <div class="map-controls">
            <div class="map-control-group">
              <span>対象</span>
              <button class="small-button neutral-button selected" id="map-rock-mode" type="button">落石</button>
              <button class="small-button neutral-button" id="map-situation-mode" type="button">状況</button>
            </div>
            <div class="map-control-group">
              <span>編集</span>
              <button class="small-button neutral-button" id="map-edit-toggle" type="button">編集OFF</button>
              <button class="small-button neutral-button" id="map-place-point" type="button">十字に配置</button>
              <button class="small-button neutral-button" id="clear-map-point" type="button">現在点を削除</button>
            </div>
            <div class="map-control-group">
              <span>尺度</span>
              <button class="small-button neutral-button" id="map-scale-tool" type="button">10m基準</button>
              <button class="small-button neutral-button" id="map-measure-tool" type="button">距離確認</button>
            </div>
            <div class="map-control-group">
              <span>図面</span>
              <button class="small-button neutral-button" id="select-map" type="button">図面選択</button>
              <button class="primary-button" id="export-map" type="button">画像出力</button>
            </div>
            </div>
            <div class="map-rock-row" id="map-rock-row">
              <label for="map-record-select">落石番号</label>
              <select id="map-record-select"></select>
              <button class="small-button neutral-button" id="map-prev-record" type="button">前</button>
              <button class="small-button neutral-button" id="map-next-record" type="button">次</button>
              <button class="small-button neutral-button" id="map-add-record" type="button">新規</button>
            </div>
            <div class="map-situation-row" id="map-situation-row" hidden>
              <label for="map-situation-select">状況写真</label>
              <select id="map-situation-select"></select>
            </div>
            <div class="map-page-row" id="map-page-row" hidden>
              <label for="map-page-select">PDFページ</label>
              <select id="map-page-select"></select>
            </div>
            <p class="map-status" id="map-status">図面を選択してください。</p>
          </div>
        </div>
      </section>
    </div>

    <div class="site-modal" id="site-modal" hidden>
      <section class="site-card" role="dialog" aria-modal="true" aria-labelledby="site-modal-title">
        <p class="eyebrow">現場設定</p>
        <h2 id="site-modal-title">現場を選択</h2>
        <label class="site-label" for="site-input">現場名</label>
        <input id="site-input" class="site-input" type="text" autocomplete="off" placeholder="例: 吉田奥出雲線">
        <button class="primary-button full-button" id="create-site" type="button">この現場で開始</button>
        <div class="site-list" id="site-list" aria-label="現場一覧"></div>
        <button class="small-button neutral-button full-button" id="close-site-modal" type="button">閉じる</button>
      </section>
    </div>

    <nav class="bottom-keypad" aria-label="専用キーボード">
      <div class="keypad-grid" id="keypad">
        <button type="button" data-key="7">7</button>
        <button type="button" data-key="8">8</button>
        <button type="button" data-key="9">9</button>
        <button type="button" data-action="back">削除</button>
        <button type="button" data-key="4">4</button>
        <button type="button" data-key="5">5</button>
        <button type="button" data-key="6">6</button>
        <button type="button" data-action="prev">前</button>
        <button type="button" data-key="1">1</button>
        <button type="button" data-key="2">2</button>
        <button type="button" data-key="3">3</button>
        <button type="button" data-action="next" class="next-key">次へ</button>
        <button type="button" data-key="0" class="wide-key">0</button>
        <button type="button" data-key=".">.</button>
        <button type="button" data-action="done" class="done-key">完了</button>
      </div>
    </nav>

    <script>
      const isLocalHttpDebug = location.protocol === "http:";
      const localDebugBuffer = [];

      function showLocalDebug(message) {
        if (!isLocalHttpDebug) return;
        localDebugBuffer.push(String(message));
        let panel = document.querySelector("#local-debug");
        if (!panel) {
          panel = document.createElement("pre");
          panel.id = "local-debug";
          panel.style.position = "fixed";
          panel.style.inset = "12px";
          panel.style.zIndex = "9999";
          panel.style.margin = "0";
          panel.style.padding = "12px";
          panel.style.overflow = "auto";
          panel.style.whiteSpace = "pre-wrap";
          panel.style.background = "rgba(24, 28, 27, 0.94)";
          panel.style.color = "#fff";
          panel.style.borderRadius = "8px";
          panel.style.font = "12px/1.45 monospace";
          document.addEventListener("DOMContentLoaded", () => {
            document.body.append(panel);
            panel.textContent = localDebugBuffer.join("\n\n");
          }, { once: true });
        }
        if (document.body && !panel.isConnected) document.body.append(panel);
        panel.textContent = localDebugBuffer.join("\n\n");
      }

      window.addEventListener("error", (event) => {
        const detail = [
          "JavaScript error",
          event.message || "unknown",
          event.filename ? `${event.filename}:${event.lineno || 0}:${event.colno || 0}` : ""
        ].filter(Boolean).join("\n");
        showLocalDebug(detail);
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason && event.reason.stack
          ? event.reason.stack
          : event.reason && event.reason.message
            ? event.reason.message
            : String(event.reason || "unknown rejection");
        showLocalDebug(`Unhandled promise rejection\n${reason}`);
      });

      showLocalDebug("local page boot");
    </script>
    <script src="app.js"></script>
    <script>
      const swHost = location.hostname;
      const canUseServiceWorker =
        location.protocol === "https:" ||
        swHost === "localhost" ||
        swHost === "127.0.0.1" ||
        swHost === "::1";

      if ("serviceWorker" in navigator && canUseServiceWorker) {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.warn("service worker registration skipped", error);
        });
      }
    </script>
  </body>
</html>
